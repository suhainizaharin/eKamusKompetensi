<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Kamus Kompetensi PPP Laluan PdP</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel untuk JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- DATA ---
        const gredData = [
            { id: 'DG41', nama: 'Pelaksana', desc: 'Memahami dan melaksanakan tugas dan tanggungjawab serta memerlukan penyeliaan dan bimbingan.', color: 'bg-red-600' },
            { id: 'DG44', nama: 'Penggerak', desc: 'Menggerakkan dan melaksanakan tugas serta tanggungjawab dengan penyeliaan dan bimbingan yang minimum.', color: 'bg-green-500' },
            { id: 'DG48', nama: 'Pembimbing & Mentor', desc: 'Menyelia, membimbing dan mampu melaksanakan langkah pencegahan bagi masalah yang dihadapi.', color: 'bg-purple-600' },
            { id: 'DG52', nama: 'Peneraju Perubahan', desc: 'Menjadi pakar rujuk, mentor, perancang dan pelaksana bagi penambahbaikan berterusan dalam bidang tertentu.', color: 'bg-teal-500' },
            { id: 'DG54', nama: 'Pemikir Strategik', desc: 'Mengurus perubahan berdasarkan kepakaran khusus.', color: 'bg-orange-500' },
            { id: 'Gred Khas', nama: 'Pemikir Holistik', desc: 'Menjadi konsultan dalam merangka strategi dan melaksanakan latihan untuk memastikan kejayaan sesebuah organisasi.', color: 'bg-blue-600' }
        ];

        const domainData = [
            { id: 'd1', title: 'Orientasi Ilmu', desc: 'Keupayaan menjadi pendidik unggul yang dapat diteladani untuk membangunkan kemenjadian murid.', color: 'bg-yellow-100 text-yellow-800 border-yellow-300' },
            { id: 'd2', title: 'Instruksional', desc: 'Keupayaan mendalami dan meluaskan pengetahuan PdP, falsafah, dasar, kurikulum, dan trend terkini.', color: 'bg-blue-100 text-blue-800 border-blue-300' },
            { id: 'd3', title: 'Pelibatan Komuniti', desc: 'Keupayaan membina jalinan dan jaringan bagi menyokong pembelajaran murid.', color: 'bg-pink-100 text-pink-800 border-pink-300' },
            { id: 'd4', title: 'Kualiti Peribadi', desc: 'Keupayaan merancang dan melaksanakan amalan instruksional untuk membangunkan potensi murid.', color: 'bg-purple-100 text-purple-800 border-purple-300' }
        ];

        const skalaData = [
            { tahap: 'Tahap 1', nama: 'Asas', desc: 'Mempunyai pengetahuan mengenai kompetensi. Memerlukan seliaan dan bimbingan.' },
            { tahap: 'Tahap 2', nama: 'Upaya', desc: 'Mempunyai pengetahuan meluas. Berupaya mengaplikasi kompetensi dan menyelesaikan masalah.' },
            { tahap: 'Tahap 3', nama: 'Mahir', desc: 'Mempunyai pengetahuan lebih meluas. Berupaya aplikasi dalam situasi mencabar, membimbing rakan.' },
            { tahap: 'Tahap 4', nama: 'Pakar', desc: 'Mempunyai pengetahuan mendalam. Berupaya menghasilkan produk/memacu perubahan.' },
            { tahap: 'Tahap 5', nama: 'Konsultan', desc: 'Pengetahuan sangat mendalam. Berupaya memberi konsultasi/khidmat runding cara. Menjadi suri teladan.' }
        ];

        const matriksKompetensi = [
            { domain: 'Orientasi Ilmu', kod: '1.1.1', elemen: 'Menghayati falsafah pendidikan', levels: ['Asas', 'Upaya', 'Mahir', 'Pakar', 'Pakar', 'Konsultan'] },
            { domain: 'Orientasi Ilmu', kod: '1.1.2', elemen: 'Mematuhi dasar pendidikan', levels: ['Upaya', 'Upaya', 'Mahir', 'Pakar', 'Pakar', 'Konsultan'] },
            { domain: 'Orientasi Ilmu', kod: '1.2.1', elemen: 'Menguasai pengetahuan pedagogi isi kandungan', levels: ['Upaya', 'Upaya', 'Mahir', 'Pakar', 'Pakar', 'Konsultan'] },
            { domain: 'Instruksional', kod: '2.1.1', elemen: 'Mengenal pasti keperluan murid untuk pembelajaran berkesan', levels: ['Upaya', 'Upaya', 'Mahir', 'Pakar', 'Konsultan', 'Konsultan'] },
            { domain: 'Instruksional', kod: '2.2.1', elemen: 'Merancang pelaksanaan pengajaran dan pembelajaran', levels: ['Upaya', 'Mahir', 'Pakar', 'Konsultan', 'Konsultan', 'Konsultan'] },
            { domain: 'Instruksional', kod: '2.3.1', elemen: 'Melaksanakan pengajaran dan pembelajaran yang berkesan', levels: ['Upaya', 'Upaya', 'Mahir', 'Pakar', 'Konsultan', 'Konsultan'] },
            { domain: 'Pelibatan Komuniti', kod: '3.1.1', elemen: 'Mewujudkan jalinan & jaringan memanfaatkan murid', levels: ['Asas', 'Upaya', 'Mahir', 'Pakar', 'Konsultan', 'Konsultan'] },
            { domain: 'Kualiti Peribadi', kod: '4.1.1', elemen: 'Melaksanakan penilaian diri secara berterusan', levels: ['Upaya', 'Mahir', 'Pakar', 'Konsultan', 'Konsultan', 'Konsultan'] },
            { domain: 'Kualiti Peribadi', kod: '4.2.3', elemen: 'Menjiwai etika keguruan', levels: ['Upaya', 'Upaya', 'Pakar', 'Konsultan', 'Konsultan', 'Konsultan'] },
            { domain: 'Kualiti Peribadi', kod: '4.3.1', elemen: 'Berkomunikasi secara berkesan', levels: ['Upaya', 'Mahir', 'Mahir', 'Pakar', 'Konsultan', 'Konsultan'] }
        ];

        // --- KOMPONEN UTAMA ---
        const App = () => {
            const [activeTab, setActiveTab] = React.useState('dashboard');
            const [selectedGred, setSelectedGred] = React.useState(gredData[0]);

            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    {/* Sidebar Navigasi */}
                    <div className="w-full md:w-64 bg-slate-800 text-white shadow-xl flex flex-col">
                        <div className="p-6 bg-slate-900 border-b border-slate-700">
                            <h1 className="text-xl font-bold text-blue-300 leading-tight">E-Kamus Kompetensi</h1>
                            <p className="text-xs text-slate-400 mt-1">PPP Laluan PdP (KPM)</p>
                        </div>
                        <nav className="flex-1 p-4 space-y-2">
                            <button onClick={() => setActiveTab('dashboard')} className={`w-full text-left px-4 py-3 rounded-lg transition-colors duration-200 ${activeTab === 'dashboard' ? 'bg-blue-600 text-white' : 'hover:bg-slate-700 text-slate-300'}`}>
                                📊 Papan Pemuka
                            </button>
                            <button onClick={() => setActiveTab('gred')} className={`w-full text-left px-4 py-3 rounded-lg transition-colors duration-200 ${activeTab === 'gred' ? 'bg-blue-600 text-white' : 'hover:bg-slate-700 text-slate-300'}`}>
                                🎓 Profil Gred
                            </button>
                            <button onClick={() => setActiveTab('matriks')} className={`w-full text-left px-4 py-3 rounded-lg transition-colors duration-200 ${activeTab === 'matriks' ? 'bg-blue-600 text-white' : 'hover:bg-slate-700 text-slate-300'}`}>
                                📈 Matriks Kompetensi
                            </button>
                            <button onClick={() => setActiveTab('skala')} className={`w-full text-left px-4 py-3 rounded-lg transition-colors duration-200 ${activeTab === 'skala' ? 'bg-blue-600 text-white' : 'hover:bg-slate-700 text-slate-300'}`}>
                                📏 Skala & Tahap
                            </button>
                        </nav>
                        <div className="p-4 text-xs text-center text-slate-500 border-t border-slate-700">
                            Berdasarkan Dokumen SGM 2.0
                        </div>
                    </div>

                    {/* Kawasan Kandungan Utama */}
                    <div className="flex-1 p-4 md:p-8 overflow-y-auto bg-gray-50 h-screen">
                        {activeTab === 'dashboard' && <Dashboard />}
                        {activeTab === 'gred' && <ProfilGred gredData={gredData} selected={selectedGred} onSelect={setSelectedGred} matriks={matriksKompetensi} />}
                        {activeTab === 'matriks' && <MatriksKompetensi matriks={matriksKompetensi} gredData={gredData} />}
                        {activeTab === 'skala' && <SkalaTahap skalaData={skalaData} domainData={domainData} />}
                    </div>
                </div>
            );
        };

        // --- KOMPONEN PAPAN PEMUKA ---
        const Dashboard = () => (
            <div className="fade-in max-w-5xl mx-auto">
                <header className="mb-8">
                    <h2 className="text-3xl font-bold text-gray-800">Selamat Datang ke E-Kamus Kompetensi</h2>
                    <p className="text-gray-600 mt-2">Penyelesaian interaktif untuk memahamai tahap kompetensi Pegawai Perkhidmatan Pendidikan (PPP) Laluan PdP.</p>
                </header>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6 flex flex-col items-center text-center">
                        <div className="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-2xl mb-4">📖</div>
                        <h3 className="font-bold text-lg text-gray-800">4 Domain Profesionalisme</h3>
                        <p className="text-gray-500 text-sm mt-2">Orientasi Ilmu, Instruksional, Pelibatan Komuniti, dan Kualiti Peribadi berasaskan SGM 2.0.</p>
                    </div>
                    <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6 flex flex-col items-center text-center">
                        <div className="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-2xl mb-4">📈</div>
                        <h3 className="font-bold text-lg text-gray-800">6 Peringkat Kerjaya</h3>
                        <p className="text-gray-500 text-sm mt-2">Dari DG41 (Pelaksana) hingga Gred Khas (Pemikir Holistik), menelusuri laluan kerjaya PdP yang jelas.</p>
                    </div>
                </div>

                <div className="bg-white rounded-xl shadow-sm border border-blue-100 p-6">
                    <h3 className="font-bold text-xl text-gray-800 mb-4 border-b pb-2">Laluan Kerjaya PPP Laluan PdP</h3>
                    <div className="relative pt-4">
                        <div className="hidden md:block absolute top-1/2 left-0 w-full h-1 bg-gray-200 -translate-y-1/2 z-0"></div>
                        <div className="flex flex-col md:flex-row justify-between items-center space-y-4 md:space-y-0 relative z-10">
                            {['DG41', 'DG44', 'DG48', 'DG52', 'DG54', 'Khas'].map((g, i) => (
                                <div key={i} className="flex flex-col items-center">
                                    <div className="w-12 h-12 rounded-full bg-blue-600 text-white font-bold flex items-center justify-center shadow-md border-4 border-white">
                                        {g}
                                    </div>
                                    <span className="text-xs font-semibold text-gray-600 mt-2">
                                        {['Pelaksana', 'Penggerak', 'Pembimbing', 'Peneraju', 'Pemikir', 'Holistik'][i]}
                                    </span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            </div>
        );

        // --- KOMPONEN PROFIL GRED ---
        const ProfilGred = ({ gredData, selected, onSelect, matriks }) => {
            const gredIndex = gredData.findIndex(g => g.id === selected.id);

            return (
                <div className="fade-in max-w-5xl mx-auto flex flex-col h-full">
                    <h2 className="text-2xl font-bold text-gray-800 mb-6">Profil & Peranan Mengikut Gred</h2>
                    
                    {/* Pemilih Gred */}
                    <div className="flex flex-wrap gap-2 mb-6">
                        {gredData.map((gred) => (
                            <button 
                                key={gred.id}
                                onClick={() => onSelect(gred)}
                                className={`px-4 py-2 rounded-full text-sm font-semibold transition-all ${selected.id === gred.id ? gred.color + ' text-white shadow-md transform scale-105' : 'bg-white text-gray-600 border border-gray-300 hover:bg-gray-100'}`}
                            >
                                {gred.id}
                            </button>
                        ))}
                    </div>

                    {/* Detail Gred */}
                    <div className="bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden mb-6 flex-shrink-0">
                        <div className={`${selected.color} p-6 text-white`}>
                            <div className="flex justify-between items-center">
                                <div>
                                    <h3 className="text-3xl font-extrabold">{selected.id}</h3>
                                    <p className="text-lg opacity-90 font-medium tracking-wide">{selected.nama}</p>
                                </div>
                                <div className="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center text-3xl">
                                    🎓
                                </div>
                            </div>
                        </div>
                        <div className="p-6">
                            <h4 className="font-semibold text-gray-700 text-sm uppercase tracking-wider mb-2">Deskripsi Peranan</h4>
                            <p className="text-gray-600 leading-relaxed text-lg border-l-4 border-gray-300 pl-4">"{selected.desc}"</p>
                        </div>
                    </div>

                    {/* Mini Matriks untuk Gred Tertentu */}
                    <div className="bg-white rounded-2xl shadow border border-gray-200 p-6 flex-1 overflow-auto">
                        <h4 className="font-bold text-gray-800 mb-4">Jangkaan Tahap Kompetensi Minimum bagi {selected.id}</h4>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            {matriks.map((m, idx) => {
                                const level = m.levels[gredIndex];
                                let badgeColor = 'bg-gray-100 text-gray-700';
                                if(level === 'Asas') badgeColor = 'bg-slate-100 text-slate-700';
                                if(level === 'Upaya') badgeColor = 'bg-blue-100 text-blue-700';
                                if(level === 'Mahir') badgeColor = 'bg-green-100 text-green-700';
                                if(level === 'Pakar') badgeColor = 'bg-orange-100 text-orange-700';
                                if(level === 'Konsultan') badgeColor = 'bg-purple-100 text-purple-700';

                                return (
                                    <div key={idx} className="flex justify-between items-center p-3 border border-gray-100 rounded-lg hover:bg-gray-50">
                                        <div className="flex-1 pr-4">
                                            <span className="text-xs font-bold text-gray-400 block">{m.domain} ({m.kod})</span>
                                            <span className="text-sm text-gray-700 font-medium leading-tight">{m.elemen}</span>
                                        </div>
                                        <span className={`px-3 py-1 rounded-full text-xs font-bold whitespace-nowrap ${badgeColor}`}>
                                            {level}
                                        </span>
                                    </div>
                                )
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        // --- KOMPONEN MATRIKS KESELURUHAN ---
        const MatriksKompetensi = ({ matriks, gredData }) => {
            const getBadgeClass = (level) => {
                if(level === 'Asas') return 'bg-slate-100 text-slate-700 border-slate-200';
                if(level === 'Upaya') return 'bg-blue-100 text-blue-700 border-blue-200';
                if(level === 'Mahir') return 'bg-green-100 text-green-700 border-green-200';
                if(level === 'Pakar') return 'bg-orange-100 text-orange-700 border-orange-200';
                if(level === 'Konsultan') return 'bg-purple-100 text-purple-700 border-purple-200';
                return 'bg-gray-100 text-gray-700';
            };

            return (
                <div className="fade-in max-w-6xl mx-auto">
                    <h2 className="text-2xl font-bold text-gray-800 mb-2">Matriks Kompetensi Keseluruhan</h2>
                    <p className="text-gray-600 mb-6 text-sm">Perbandingan tahap minimum kompetensi untuk setiap elemen merentas seluruh gred.</p>
                    
                    <div className="bg-white shadow-lg rounded-xl overflow-hidden border border-gray-200">
                        <div className="overflow-x-auto">
                            <table className="w-full text-left border-collapse">
                                <thead>
                                    <tr className="bg-slate-800 text-white">
                                        <th className="p-4 text-sm font-semibold w-1/3 min-w-[250px]">Elemen Kompetensi</th>
                                        {gredData.map(g => (
                                            <th key={g.id} className="p-4 text-sm font-semibold text-center whitespace-nowrap">
                                                <div className="flex flex-col items-center">
                                                    <span>{g.id}</span>
                                                </div>
                                            </th>
                                        ))}
                                    </tr>
                                </thead>
                                <tbody>
                                    {matriks.map((row, idx) => (
                                        <tr key={idx} className="border-b border-gray-100 hover:bg-slate-50 transition-colors">
                                            <td className="p-4">
                                                <span className="text-xs uppercase tracking-wider font-bold text-indigo-500 block mb-1">{row.domain}</span>
                                                <span className="text-sm font-medium text-gray-800 block">{row.kod} - {row.elemen}</span>
                                            </td>
                                            {row.levels.map((level, lIdx) => (
                                                <td key={lIdx} className="p-3 text-center">
                                                    <span className={`inline-block px-2 py-1 border rounded text-xs font-semibold w-full text-center ${getBadgeClass(level)}`}>
                                                        {level}
                                                    </span>
                                                </td>
                                            ))}
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        // --- KOMPONEN SKALA & TAHAP ---
        const SkalaTahap = ({ skalaData, domainData }) => (
            <div className="fade-in max-w-5xl mx-auto space-y-8">
                
                {/* Bahagian 4 Domain */}
                <section>
                    <h2 className="text-2xl font-bold text-gray-800 mb-4">4 Domain Kompetensi (SGM 2.0)</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {domainData.map(d => (
                            <div key={d.id} className={`p-5 rounded-xl border-l-4 ${d.color} bg-opacity-50`}>
                                <h3 className="font-bold text-lg mb-2">{d.title}</h3>
                                <p className="text-sm opacity-90 leading-relaxed">{d.desc}</p>
                            </div>
                        ))}
                    </div>
                </section>

                <hr className="border-gray-200" />

                {/* Bahagian Skala Kecekapan */}
                <section>
                    <h2 className="text-2xl font-bold text-gray-800 mb-4">Skala Kecekapan Kompetensi</h2>
                    <div className="space-y-4">
                        {skalaData.map((s, idx) => (
                            <div key={idx} className="bg-white rounded-lg shadow-sm border border-gray-200 p-5 flex flex-col md:flex-row md:items-center gap-4 hover:shadow-md transition-shadow">
                                <div className="flex-shrink-0">
                                    <div className="w-16 h-16 rounded-full bg-slate-800 text-white flex flex-col items-center justify-center border-4 border-slate-100 shadow-inner">
                                        <span className="text-xs font-medium uppercase tracking-wider">{s.tahap.split(' ')[0]}</span>
                                        <span className="text-xl font-bold">{s.tahap.split(' ')[1]}</span>
                                    </div>
                                </div>
                                <div>
                                    <h4 className="text-xl font-bold text-blue-700">{s.nama}</h4>
                                    <p className="text-gray-600 mt-1">{s.desc}</p>
                                </div>
                            </div>
                        ))}
                    </div>
                </section>

            </div>
        );

        // Render aplikasi
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
